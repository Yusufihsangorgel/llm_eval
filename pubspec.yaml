name: llm_eval
description: "A Dart test harness that runs assertion checks over LLM outputs, adds an optional LLM-as-judge, and caches responses so CI stays deterministic."
version: 0.1.1
repository: https://github.com/Yusufihsangorgel/llm_eval
topics:
  - llm
  - ai
  - testing
  - evaluation
  - ci

environment:
  sdk: ^3.8.0

dependencies:
  crypto: ^3.0.6

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
