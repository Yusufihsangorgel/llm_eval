name: llm_eval
description: >-
  A Dart test harness for LLM evals: assertion checks over model outputs, an
  optional LLM-as-judge, and cached responses so CI stays deterministic.
version: 0.4.0
repository: https://github.com/Yusufihsangorgel/llm_eval
topics:
  - llm
  - ai
  - testing
  - evaluation
  - ci

screenshots:
  - description: >-
      You bind one model function; the harness runs cases concurrently, checks o
      utputs, caches responses, and reports pass rate and scores.
    path: doc/architecture.png

environment:
  sdk: ^3.8.0

dependencies:
  crypto: ^3.0.6

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
  xml: ^6.5.0
