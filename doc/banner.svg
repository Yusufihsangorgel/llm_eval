<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#E2E8F0" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="#0B1220"/>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- type lockup, lower left -->
  <rect x="66" y="200" width="44" height="6" fill="#38BDF8"/>
  <text x="64" y="292" font-family="Menlo, monospace" font-size="64" font-weight="bold" fill="#E2E8F0">llm_eval</text>
  <text x="66" y="338" font-family="Menlo, monospace" font-size="24" fill="#94A3B8">A test harness for LLM outputs in Dart</text>

  <!-- motif: 3x3 eval grid (pass / fail / pending) + score line -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(0 16)">
    <!-- row 1: pass, pass, pass -->
    <rect x="836" y="84" width="46" height="46" rx="4" fill="#1E3A5F"/>
    <path d="M 848 108 L 856 116 L 870 96" stroke="#38BDF8" stroke-width="3"/>
    <rect x="896" y="84" width="46" height="46" rx="4" fill="#1E3A5F"/>
    <path d="M 908 108 L 916 116 L 930 96" stroke="#38BDF8" stroke-width="3"/>
    <rect x="956" y="84" width="46" height="46" rx="4" fill="#1E3A5F"/>
    <path d="M 968 108 L 976 116 L 990 96" stroke="#38BDF8" stroke-width="3"/>

    <!-- row 2: pass, fail, pass -->
    <rect x="836" y="144" width="46" height="46" rx="4" fill="#1E3A5F"/>
    <path d="M 848 168 L 856 176 L 870 156" stroke="#38BDF8" stroke-width="3"/>
    <rect x="896" y="144" width="46" height="46" rx="4" stroke="#1E3A5F" stroke-width="3"/>
    <path d="M 908 156 L 930 178 M 930 156 L 908 178" stroke="#94A3B8" stroke-width="3"/>
    <rect x="956" y="144" width="46" height="46" rx="4" fill="#1E3A5F"/>
    <path d="M 968 168 L 976 176 L 990 156" stroke="#38BDF8" stroke-width="3"/>

    <!-- row 3: pass, pass, pending -->
    <rect x="836" y="204" width="46" height="46" rx="4" fill="#1E3A5F"/>
    <path d="M 848 228 L 856 236 L 870 216" stroke="#38BDF8" stroke-width="3"/>
    <rect x="896" y="204" width="46" height="46" rx="4" fill="#1E3A5F"/>
    <path d="M 908 228 L 916 236 L 930 216" stroke="#38BDF8" stroke-width="3"/>
    <rect x="956" y="204" width="46" height="46" rx="4" stroke="#1E3A5F" stroke-width="3"/>
  </g>

  <!-- score readout beside the grid -->
  <text x="1024" y="190" font-family="Menlo, monospace" font-size="20" fill="#94A3B8">SCORE: <tspan fill="#38BDF8">0.8</tspan></text>
</svg>
